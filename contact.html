<!DOCTYPE html>

<html lang="en">
    <head>
        <title>Travel NZ - Contact</title> 
        <link rel="stylesheet" href="css/style.css">
        <link rel="icon" type="image/png" href="img/icon1.png">
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>

    <body>
        <header>
            <div class="left-header">
            <h1><a href="home.html">Travel NZ</a></h1>
            </div> 

            <div class="header-links">
                <a href="home.html">Home</a>
                <a href="tours.html">Tours</a>
                <a href="contact.html">Contact</a>
            </div>

        </header>


        <section class="contact">
            <h2>Contact US</h2>
            <p class="subtitle">Fill out this form below</p>
            <form class="contact-form">
                <div class="form-group">
                    <label>Name</label>
                    <input type="text" name="name" placeholder="Name">
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="Email Address">
                </div>

                <div class="form-group">
                    <label>Phone</label>
                    <input type="tel" name="phone" placeholder="Phone Number">
                </div>

                <div class="form-group">
                    <label>How Can We Help ?</label>
                    <textarea type="message" placeholder="Type Here" rows="5"></textarea>
                </div>

                <button class="send-btn">Send</button>
            </form>
        </section>

        <footer>
            <div class="left-footer">
                <h6><a href="home.html" class="footer-title">Travel NZ</a></h6>
                <a href="tours.html">Tours</a>
                <a href="contact.html">Contact Us</a>
            </div>

            <div class="right-footer">
                <p>&copy; TravelNZ 2026</p>
                <p>Made By Riley</p>
            </div>
        </footer>
    </body>
</html>
